<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Town Assault</title>
  <link rel="icon" href="data:," />
  <link type="text/css" rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/png" href="img/icon.png">

  <style>
    #info{ display:none; }

    #start-screen{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(8,24,38,.88), rgba(8,24,38,.76));
      z-index:9999;
    }

    #start-card{
      width:min(720px, 92vw);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:28px 26px;
      color:#eaf2f9;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    #start-card h1{
      margin:0 0 10px;
      font:800 36px/1.2 system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
      letter-spacing:.5px;
    }

    #start-card p,
    #start-card li{
      font:500 15px/1.6 system-ui, sans-serif;
      color:#d7e6f3;
    }

    #start-card ul{
      margin:.2rem 0 1rem 1.2rem;
    }

    #start-btn{
      margin-top:10px;
      padding:10px 18px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      font:700 16px/1 system-ui, sans-serif;
      letter-spacing:.4px;
      background:#7bc3ff;
      color:#0c2233;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }

    #start-btn:hover{
      filter:brightness(1.06);
    }

    .hidden{
      display:none !important;
    }

    html, body{
      height:100%;
      margin:0;
    }

    #container{
      position:fixed;
      inset:0;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <div id="start-card">
      <h1>Clock Town Assault - Buscar y Destruir!!</h1>
      <p>Sobrevive a 3 oleadas de enemigos que aparecen en la zona de construcción.</p>
      <ul>
        <li><b>WASD</b> para moverte, <b>Espacio</b> para saltar</li>
        <li><b>Mouse</b> para mirar, <b>Click izq.</b> lanza una esfera</li>
        <li>Apuntan y disparan si te ven — ¡no te quedes quieto!</li>
      </ul>
      <button id="start-btn">Iniciar</button>
    </div>
  </div>

  <div id="container"></div>

  <audio id="fondo" loop preload="auto">
    <source src="img/fondo.mp4" type="audio/mp4">
    Tu navegador no soporta audio HTML5.
  </audio>

  <script type="importmap">
    {
      "imports": {
        "three": "./build/three.module.js",
        "three/addons/": "./jsm/"
      }
    }
  </script>

  <script type="module" src="js/main.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('start-btn');
      const musica = document.getElementById('fondo');

      if (btn) {
        btn.addEventListener('click', () => {
          if (musica) {
            musica.volume = 0.5;
            musica.play().catch(error => {
              console.log('No se pudo reproducir el audio:', error);
            });
          }

          if (window.startGame) {
            window.startGame();
          }
        });
      }
    });
  </script>

</body>
</html>
